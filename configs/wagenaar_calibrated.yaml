# BL-1 Wagenaar-Calibrated Configuration
# Parameters tuned to reproduce spontaneous bursting observed in
# mature rat cortical cultures (DIV 21-35) as reported in:
#
#   Wagenaar, Pine & Potter (2006) "An extremely rich repertoire
#   of bursting patterns in the activity of cortical cultures"
#   J Neurosci 26(31):7610-7625
#
# Target statistics:
#   - Inter-burst interval: 3-30 s (mean ~10 s)
#   - Burst duration: 5-50 ms (network spikes)
#   - Network burst rate: 3-20 bursts/min
#   - Spontaneous firing between bursts: 0.1-5 Hz
#
# Calibrated on CPU with 3000 neurons, 30s simulation.
# Key finding: very sparse connectivity (p_max=0.02) + strong weights
# (g_exc=0.5) + long STP recovery (tau_rec=3000ms) produces
# ~8 bursts/min with IBI ~9s.

culture:
  n_neurons: 5000
  ei_ratio: 0.8
  neuron_model: izhikevich
  substrate_um: [3000, 3000]
  connectivity: distance_dependent
  lambda_um: 200.0
  p_max: 0.02                # Very sparse — makes bursts rare stochastic events
  g_exc: 0.50                # Strong, but STP depression halves on first spike
  g_inh: 2.00                # 4x excitatory

simulation:
  dt_ms: 0.5
  v_init: -65.0

background:
  mean: 1.0                  # Subthreshold tonic drive
  std: 3.0                   # Noise pushes occasional neurons over threshold

stp:
  enabled: true
  excitatory:
    U: 0.5                   # 50% release probability per spike
    tau_rec_ms: 3000.0        # 3 second recovery — sets IBI timescale
    tau_fac_ms: 0.001         # No facilitation
  inhibitory:
    U: 0.04
    tau_rec_ms: 100.0
    tau_fac_ms: 1000.0

burst_detection:
  threshold_std: 1.5          # Sensitive threshold for network spikes
  min_duration_ms: 5.0        # Network spikes are brief (5-25ms)

# Empirically measured output (3000 neurons, 30s, seed=42):
#   Mean firing rate: 1.4 Hz
#   Burst rate: 8/min
#   IBI: 9252 ms
#   Burst duration: 14 ms
#   Recruitment: 7%
